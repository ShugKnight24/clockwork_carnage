<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Clockwork Carnage</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self' https://www.google-analytics.com https://analytics.google.com"
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-M2ETG779YT"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-M2ETG779YT");
    </script>
  </head>
  <body>
    <!-- Title Screen -->
    <div id="titleScreen">
      <h1>CLOCKWORK CARNAGE</h1>
      <div class="title-svg-container">
        <title-background></title-background>
        <title-clock></title-clock>
        <title-hero></title-hero>
        <title-paradox-lord></title-paradox-lord>
      </div>

      <div class="subtitle">Glitch Protocol</div>
      <div class="start-prompt">[ CLICK OR PRESS ENTER TO START ]</div>
      <div class="version-label" id="versionLabel"></div>
    </div>

    <!-- Mode Select Screen -->
    <div id="modeSelect" class="hidden">
      <h2>SELECT MISSION</h2>
      <div class="mode-buttons">
        <button class="mode-btn featured" id="btnCampaign">
          <!-- Crosshair -->
          <svg
            class="btn-icon"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle
              cx="12"
              cy="12"
              r="9"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <circle
              cx="12"
              cy="12"
              r="4"
              stroke="currentColor"
              stroke-width="1.2"
            />
            <line
              x1="12"
              y1="1"
              x2="12"
              y2="6"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <line
              x1="12"
              y1="18"
              x2="12"
              y2="23"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <line
              x1="1"
              y1="12"
              x2="6"
              y2="12"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <line
              x1="18"
              y1="12"
              x2="23"
              y2="12"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <circle cx="12" cy="12" r="1.2" fill="currentColor" />
          </svg>
          CAMPAIGN: FIX THE TIMELINE
          <div class="mode-desc">
            Fight through levels. Defeat the Paradox Lord.
          </div>
          <span class="key-hint">[1]</span>
        </button>
        <button class="mode-btn continue-btn hidden" id="btnContinueCampaign">
          CONTINUE CAMPAIGN
          <div class="mode-desc" id="continueCampaignDesc"></div>
        </button>
        <button class="mode-btn" id="btnArena">
          <!-- Hourglass -->
          <svg
            class="btn-icon"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M6 2h12v2H6V2z" fill="currentColor" opacity="0.7" />
            <path d="M6 20h12v2H6v-2z" fill="currentColor" opacity="0.7" />
            <path
              d="M7 4v3c0 2.5 2 4.5 4 5.5v-.5c0-.3.2-.5.5-.5h1c.3 0 .5.2.5.5v.5c2-1 4-3 4-5.5V4H7z"
              fill="currentColor"
              opacity="0.5"
            />
            <path
              d="M7 20v-3c0-2.5 2-4.5 4-5.5v.5c0 .3.2.5.5.5h1c.3 0 .5-.2.5-.5v-.5c2 1 4 3 4 5.5v3H7z"
              fill="currentColor"
              opacity="0.3"
            />
            <path d="M11 10h2v4h-2z" fill="currentColor" opacity="0.6" />
            <circle cx="12" cy="15" r="1" fill="currentColor">
              <animate
                attributeName="opacity"
                values="1;0.3;1"
                dur="2s"
                repeatCount="indefinite"
              />
            </circle>
          </svg>
          TEMPORAL ARENA
          <div class="mode-desc">
            60-second combat loop. Survive, upgrade, repeat.
          </div>
          <span class="key-hint">[2]</span>
        </button>
        <button class="mode-btn continue-btn hidden" id="btnContinueArena">
          CONTINUE ARENA
          <div class="mode-desc" id="continueArenaDesc"></div>
        </button>
        <button class="mode-btn" id="btnTutorial">
          <!-- Brain/training icon -->
          <svg
            class="btn-icon"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle
              cx="12"
              cy="12"
              r="9"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M12 7v6l4 2"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
            <circle cx="12" cy="12" r="1.5" fill="currentColor">
              <animate
                attributeName="opacity"
                values="1;0.4;1"
                dur="1.5s"
                repeatCount="indefinite"
              />
            </circle>
          </svg>
          TEMPORAL CALIBRATION
          <div class="mode-desc">
            Learn the basics. Master movement, combat, and abilities.
          </div>
          <span class="key-hint">[3]</span>
        </button>
        <button class="mode-btn" id="btnBuilder">
          <!-- Grid/blocks icon -->
          <svg
            class="btn-icon"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect
              x="3"
              y="3"
              width="7"
              height="7"
              rx="1"
              fill="currentColor"
              opacity="0.7"
            />
            <rect
              x="14"
              y="3"
              width="7"
              height="7"
              rx="1"
              fill="currentColor"
              opacity="0.5"
            />
            <rect
              x="3"
              y="14"
              width="7"
              height="7"
              rx="1"
              fill="currentColor"
              opacity="0.5"
            />
            <rect
              x="14"
              y="14"
              width="7"
              height="7"
              rx="1"
              fill="currentColor"
              opacity="0.3"
            >
              <animate
                attributeName="opacity"
                values="0.3;0.7;0.3"
                dur="2s"
                repeatCount="indefinite"
              />
            </rect>
          </svg>
          TEMPORAL FORGE
          <div class="mode-desc">
            Build your own arenas. Place walls, enemies, and test your
            creations.
          </div>
          <span class="key-hint">[4]</span>
        </button>
        <button class="mode-btn" id="btnCustomize">
          <!-- Person/gear icon -->
          <svg
            class="btn-icon"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle
              cx="12"
              cy="7"
              r="4"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M4 21v-2c0-3.3 2.7-6 6-6h4c3.3 0 6 2.7 6 6v2"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
            <circle
              cx="18"
              cy="18"
              r="3"
              fill="currentColor"
              opacity="0.5"
              class="pulse-dot"
            />
          </svg>
          CUSTOMIZE AGENT
          <div class="mode-desc">
            Colors, armor, badges, weapon skins, loadouts.
          </div>
          <span class="key-hint">[5]</span>
        </button>
      </div>
      <div class="coming-soon">
        <!-- Star -->
        <svg
          class="btn-icon"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12 2l2.4 7.2H22l-6 4.8 2.4 7.2L12 16.4 5.6 21.2 8 14 2 9.2h7.6L12 2z"
            fill="currentColor"
          >
            <animate
              attributeName="opacity"
              values="0.6;1;0.6"
              dur="2s"
              repeatCount="indefinite"
            />
          </path>
        </svg>
        MORE COMING SOON
        <!-- Star -->
        <svg
          class="btn-icon"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12 2l2.4 7.2H22l-6 4.8 2.4 7.2L12 16.4 5.6 21.2 8 14 2 9.2h7.6L12 2z"
            fill="currentColor"
          >
            <animate
              attributeName="opacity"
              values="0.6;1;0.6"
              dur="2s"
              repeatCount="indefinite"
            />
          </path>
        </svg>
      </div>
      <button class="back-btn" id="btnBack">← BACK [ESC]</button>
      <button class="fullscreen-btn" id="btnFullscreen" aria-label="Toggle fullscreen">⛶ FULLSCREEN</button>
    </div>

    <!-- Game Canvases -->
    <canvas
      id="gameCanvas"
      role="img"
      aria-label="Clockwork Carnage game viewport — 3D first-person shooter"
    ></canvas>
    <canvas
      id="hudCanvas"
      role="img"
      aria-label="Heads-up display showing health, ammo, score, and round information"
    ></canvas>

    <!-- Portrait orientation prompt (touch devices only) -->
    <div id="orientationPrompt">
      <div class="orientation-icon">⟳</div>
      <div class="orientation-text">Rotate your device to landscape</div>
    </div>

    <script type="module" src="js/main.js"></script>
    <script type="module">
      import "./js/components/title-background.js";
      import "./js/components/title-clock.js";
      import "./js/components/title-hero.js";
      import "./js/components/title-paradox-lord.js";
    </script>
  </body>
</html>
